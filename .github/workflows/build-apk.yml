name: Build APK

# اجرای دستی از تب Actions در گیت‌هاب، یا خودکار روی هر push به main
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # نسخه مشخص برای تطابق با .metadata پروژه؛ در صورت نیاز می‌توانید حذف کنید تا آخرین stable استفاده شود
          flutter-version: '3.24.5'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Drift / Riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze project (non-blocking)
        run: flutter analyze || true

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
